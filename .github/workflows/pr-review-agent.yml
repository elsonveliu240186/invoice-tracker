name: PR Review Agent

# Fires when:
#   - a reviewer submits a review (approved, changes_requested, or commented)
#   - someone adds an inline review comment
#   - someone posts a general PR comment containing "@claude"
on:
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  contents: write        # push fix commits
  pull-requests: write   # post reply comments
  issues: write

jobs:
  # ── Guard: only run on PRs, skip bot comments, skip "approved" with no body ─
  should-run:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - name: Decide whether to act
        id: check
        env:
          REVIEW_STATE:  ${{ github.event.review.state }}
          REVIEW_BODY:   ${{ github.event.review.body }}
          COMMENT_BODY:  ${{ github.event.comment.body }}
          ACTOR:         ${{ github.actor }}
        run: |
          # Skip bot-authored events
          if [[ "$ACTOR" == *"[bot]"* ]]; then
            echo "run=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # For issue_comment: only act if the comment contains @claude
          if [[ "${{ github.event_name }}" == "issue_comment" ]]; then
            if [[ "$COMMENT_BODY" == *"@claude"* ]]; then
              echo "run=true" >> $GITHUB_OUTPUT
            else
              echo "run=false" >> $GITHUB_OUTPUT
            fi
            exit 0
          fi

          # For pull_request_review: skip pure "approved" with no body
          if [[ "${{ github.event_name }}" == "pull_request_review" ]]; then
            if [[ "$REVIEW_STATE" == "approved" && -z "$REVIEW_BODY" ]]; then
              echo "run=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          echo "run=true" >> $GITHUB_OUTPUT

  # ── Main: fetch review comments, run Claude Code, push fixes ────────────────
  handle-review:
    needs: should-run
    if: needs.should-run.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the PR branch so we can push fixes back
          ref: ${{ github.event.pull_request.head.ref || github.event.review.pull_request_url }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Collect PR review context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.review.pull_request_url }}
        run: |
          PR_NUM=$(echo "${{ github.event.pull_request.number }}" || \
                   gh api ${{ github.event.review.pull_request_url }} --jq '.number')
          # Dump all unresolved review comments + review body into a file
          gh api repos/${{ github.repository }}/pulls/${PR_NUM}/comments \
            --jq '[.[] | {id:.id, path:.path, line:.line, body:.body, user:.user.login}]' \
            > /tmp/review_comments.json
          gh api repos/${{ github.repository }}/pulls/${PR_NUM}/reviews \
            --jq '[.[] | select(.state=="CHANGES_REQUESTED" or .state=="COMMENTED") | {id:.id, state:.state, body:.body, user:.user.login}]' \
            > /tmp/reviews.json
          echo "pr_number=${PR_NUM}" >> $GITHUB_OUTPUT

      - name: Run Claude Code to fix review comments
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
        run: |
          claude --print --model claude-sonnet-4-6 "
          You are fixing code review comments on PR #${PR_NUMBER} of the invoice-tracker project.

          Review comments (inline):
          $(cat /tmp/review_comments.json)

          Review summaries (CHANGES_REQUESTED / COMMENTED):
          $(cat /tmp/reviews.json)

          Repository root: $(pwd)
          Project CLAUDE.md: $(cat .claude/CLAUDE.md 2>/dev/null || cat CLAUDE.md 2>/dev/null)

          Instructions:
          1. Read each comment carefully. For each actionable item:
             a. Read the referenced file at the referenced line.
             b. Apply the fix directly using Edit or Write.
             c. If it is a backend change, run: JAVA_HOME=/c/Users/ExpertBook/.jdks/temurin-21.0.4 ./mvnw -Pfast verify (from backend/)
             d. If it is a frontend change, run: pnpm lint && pnpm test:run (from frontend/)
          2. Skip comments that are questions, praise, or already resolved.
          3. After all fixes, create a single git commit:
             git config user.name 'claude-code[bot]'
             git config user.email 'claude-code[bot]@users.noreply.github.com'
             git add -A
             git commit -m 'fix: address PR review comments (automated)'
          4. Then post a summary comment on the PR via:
             gh pr comment ${PR_NUMBER} --body '...'
             listing each comment addressed and what was changed.
          " 2>&1

      - name: Push fixes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin HEAD 2>&1 || echo "Nothing to push"
