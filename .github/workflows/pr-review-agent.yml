name: Claude Fix Review Comments

# Fires when:
#   - Copilot (or any reviewer) submits a review with CHANGES_REQUESTED or COMMENTED
#   - Someone adds an inline review comment
#   - Someone posts a PR comment containing "@claude"
#
# Loop-safety: skips events authored by claude-code[bot] (its own fix commits)
# but DOES act on copilot-pull-request-reviewer[bot] review submissions.
on:
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ── Guard ──────────────────────────────────────────────────────────────────
  should-run:
    runs-on: ubuntu-latest
    outputs:
      run:        ${{ steps.check.outputs.run }}
      pr_number:  ${{ steps.check.outputs.pr_number }}
    steps:
      - name: Decide whether to act
        id: check
        env:
          ACTOR:        ${{ github.actor }}
          EVENT:        ${{ github.event_name }}
          REVIEW_STATE: ${{ github.event.review.state }}
          REVIEW_BODY:  ${{ github.event.review.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # Never react to our own fix commits (prevents infinite loop)
          if [[ "$ACTOR" == "claude-code[bot]" ]]; then
            echo "run=false" >> $GITHUB_OUTPUT; exit 0
          fi

          # issue_comment: only act on @claude mentions (and only on PRs)
          if [[ "$EVENT" == "issue_comment" ]]; then
            if [[ -z "${{ github.event.issue.pull_request }}" ]]; then
              echo "run=false" >> $GITHUB_OUTPUT; exit 0
            fi
            if [[ "$COMMENT_BODY" != *"@claude"* ]]; then
              echo "run=false" >> $GITHUB_OUTPUT; exit 0
            fi
            echo "pr_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
            echo "run=true" >> $GITHUB_OUTPUT; exit 0
          fi

          # pull_request_review: skip pure "approved" with no body
          if [[ "$EVENT" == "pull_request_review" ]]; then
            if [[ "$REVIEW_STATE" == "approved" && -z "$REVIEW_BODY" ]]; then
              echo "run=false" >> $GITHUB_OUTPUT; exit 0
            fi
            echo "pr_number=${{ github.event.review.pull_request.number || github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          fi

          # pull_request_review_comment
          if [[ "$EVENT" == "pull_request_review_comment" ]]; then
            echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          fi

          echo "run=true" >> $GITHUB_OUTPUT

  # ── Claude fixes ───────────────────────────────────────────────────────────
  fix-comments:
    needs: should-run
    if: needs.should-run.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.event.review.commit_id }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Collect all PR review comments
        id: collect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.should-run.outputs.pr_number }}
        run: |
          # Inline comments (file + line specific)
          gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/comments" \
            --jq '[.[] | {id:.id, path:.path, line:.original_line, body:.body, author:.user.login}]' \
            > /tmp/inline_comments.json

          # Review-level summaries (CHANGES_REQUESTED + COMMENTED only)
          gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews" \
            --jq '[.[] | select(.state=="CHANGES_REQUESTED" or .state=="COMMENTED") | {id:.id, state:.state, body:.body, author:.user.login}]' \
            > /tmp/review_summaries.json

          echo "Inline comments:"
          cat /tmp/inline_comments.json
          echo "Review summaries:"
          cat /tmp/review_summaries.json

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Apply fixes with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.should-run.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          cat > /tmp/fix_prompt.md << 'PROMPT'
          You are an automated assistant fixing code review comments on a GitHub PR.

          Project: invoice-tracker (Spring Boot 3.5.3 backend + React/Vite frontend)
          Working directory: the repo root is your current directory.
          CLAUDE.md is at CLAUDE.md — read it first for project conventions.

          ## Inline review comments (file + line)
          INLINE_COMMENTS_PLACEHOLDER

          ## Review summary comments (overall review body)
          REVIEW_SUMMARIES_PLACEHOLDER

          ## Instructions
          1. Read CLAUDE.md for project conventions.
          2. For each inline comment: read the file at the given path and line, understand the issue, apply the fix.
          3. For each review summary: identify which files need changing and fix them.
          4. Skip: pure questions with no actionable ask, praise, already-resolved threads, and "approved" reviews.
          5. After fixing, verify:
             - Backend changes: run `JAVA_HOME=/usr/lib/jvm/temurin-21 ./mvnw -Pfast verify` from backend/
             - Frontend changes: run `pnpm lint && pnpm test:run` from frontend/
          6. Commit all fixes as a single commit:
             ```
             git config user.name "claude-code[bot]"
             git config user.email "claude-code[bot]@users.noreply.github.com"
             git add -A
             git commit -m "fix: address PR #PR_NUMBER_PLACEHOLDER review comments"
             ```
          7. Post a summary comment on the PR:
             ```
             gh pr comment PR_NUMBER_PLACEHOLDER --repo REPO_PLACEHOLDER --body "..."
             ```
             The body must list: each comment addressed, what file/line was changed, what the fix was.
             Mark anything skipped and why.
          PROMPT

          # Substitute placeholders
          sed -i "s|INLINE_COMMENTS_PLACEHOLDER|$(cat /tmp/inline_comments.json)|" /tmp/fix_prompt.md
          sed -i "s|REVIEW_SUMMARIES_PLACEHOLDER|$(cat /tmp/review_summaries.json)|" /tmp/fix_prompt.md
          sed -i "s|PR_NUMBER_PLACEHOLDER|${PR_NUMBER}|g" /tmp/fix_prompt.md
          sed -i "s|REPO_PLACEHOLDER|${REPO}|g" /tmp/fix_prompt.md

          claude --print --model claude-sonnet-4-6 "$(cat /tmp/fix_prompt.md)"

      - name: Push fixes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --cached --quiet && git diff --quiet; then
            echo "No changes to push."
          else
            git push origin HEAD
          fi
