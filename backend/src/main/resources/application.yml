spring:
  application:
    name: ${PROJECT_NAME:invoice-tracker}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/invoice-tracker
    username: app
    password: app
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/invoice-tracker
    username: ${POSTGRES_USER:-app}
    password: ${POSTGRES_PASSWORD:-app}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true

---
spring:
  config:
    activate:
      on-profile: ci
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
