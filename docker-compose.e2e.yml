name: invoice-tracker-e2e

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: invoicetracker_e2e
      POSTGRES_USER: e2e
      POSTGRES_PASSWORD: e2e
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U e2e -d invoicetracker_e2e"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "127.0.0.1:1026:1025"
      - "127.0.0.1:8026:8025"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: e2e
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/invoicetracker_e2e
      SPRING_DATASOURCE_USERNAME: e2e
      SPRING_DATASOURCE_PASSWORD: e2e
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: "1025"
      SPRING_SECURITY_USER_NAME: admin
      SPRING_SECURITY_USER_PASSWORD: Secret1!
    ports:
      - "127.0.0.1:8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      backend:
        condition: service_healthy
