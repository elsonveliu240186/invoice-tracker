services:
  postgres:
    image: postgres:16
    container_name: ${COMPOSE_PROJECT_NAME:-invoice-tracker}-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-invoice-tracker}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
